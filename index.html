<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestão de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0d0d0d;--sf:#1a1a1a;--sf2:#242424;--bd:#2e2e2e;--tx:#fff;--tx2:#8a8a8a;--red:#e05252;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;overflow:hidden;}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg);opacity:0;transform:translateY(10px);transition:opacity .22s ease,transform .22s ease;pointer-events:none;}
.screen.active{opacity:1;transform:translateY(0);pointer-events:auto;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;flex-shrink:0;}
.pill{display:flex;align-items:center;gap:6px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:8px 14px;cursor:pointer;font-size:14px;font-weight:600;}
.pill:active{background:var(--sf2);}
.ibtn{width:40px;height:40px;border-radius:50%;background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
.ibtn:active{background:var(--sf2);}
.ph{padding:6px 20px 12px;}
.ptitle{font-size:32px;font-weight:800;}
.sw{padding:0 20px 12px;}
.sbox{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.sbox input{background:transparent;border:none;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;width:100%;outline:none;}
.clist{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;cursor:pointer;}
.cname{font-size:15px;font-weight:600;margin-bottom:6px;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,.96);border-top:1px solid var(--bd);display:flex;z-index:100;}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 12px;cursor:pointer;gap:3px;border:none;background:transparent;color:var(--tx2);font-family:'Inter',sans-serif;font-size:12px;}
.nitem.active{color:var(--red);}
.nitem div{font-size:22px;}
.fab{position:fixed;bottom:90px;right:16px;width:56px;height:56px;background:var(--red);border-radius:50%;border:none;color:#fff;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;font-weight:700;}
.fab:active{transform:scale(.92);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:90;display:none;}
.ov.open{display:block;}
.panel{position:fixed;top:0;left:0;width:100%;max-width:430px;height:100vh;background:var(--bg);z-index:95;overflow-y:auto;transform:translateX(-100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.panel.open{transform:translateX(0);}
.panel-header{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.panel-back{background:var(--sf);border:1px solid var(--bd);width:40px;height:40px;border-radius:50%;cursor:pointer;color:var(--red);font-size:24px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .2s;}
.panel-back:active{background:var(--sf2);}
.panel-title{font-size:16px;font-weight:700;}
.panel-body{padding:16px;}
.drawer{background:#181818;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;animation:sup .25s ease;}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.dhandle{width:32px;height:3px;background:var(--bd);border-radius:2px;margin:10px auto;}
.dhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);}
.dtitle{font-size:16px;font-weight:700;}
.dclose{background:var(--sf2);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;color:var(--red);font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .2s;}
.dclose:active{background:rgba(224,82,82,.1);}
.sbtn{background:var(--red);border:none;border-radius:8px;padding:6px 16px;color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;width:100%;}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;}
.sbtn span{color:#fff;font-weight:700;}
.dbody{padding:18px;}
.fcol{display:flex;flex-direction:column;gap:4px;}
.ffull{margin-bottom:12px;}
.flbl{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--tx2);text-transform:uppercase;}
.req-row{display:flex;align-items:center;gap:2px;margin-bottom:4px;}
.req-star{color:var(--red);font-size:12px;font-weight:800;}
.finp{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:100%;}
.finp:focus{border-color:var(--red);}
input[type="date"]{background:var(--sf2)!important;border:1px solid var(--bd)!important;border-radius:8px!important;padding:10px 12px!important;color:var(--tx)!important;font-size:14px!important;font-family:'Inter',sans-serif!important;outline:none!important;width:100%!important;cursor:pointer!important;}
input[type="date"]:focus{border-color:var(--red)!important;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;}
.sopts{display:flex;flex-direction:column;gap:6px;}
.sopt{background:var(--sf2);border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);text-align:left;width:100%;font-family:'Inter',sans-serif;}
.sopt.sel{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.08);}
.scan-btn{background:var(--red);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scan-btn:active{opacity:.8;}
.tw{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:10000;width:calc(100% - 32px);max-width:398px;}
.toast{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;width:100%;text-align:center;background:#2a2a2a;color:#fff;animation:ti .2s ease;margin-bottom:8px;}
@keyframes ti{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.empty{text-align:center;padding:50px 20px;color:var(--tx2);font-size:13px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
</style>
</head>
<body>

<div id="app">
  <div class="screen active" id="s-estoque">
    <div class="topbar">
      <div class="pill" onclick="abrirLojas()"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);"></span><span id="ln-e">Loja 1</span></div>
      <div style="display:flex;gap:6px;"><div class="ibtn">🔗</div><div class="ibtn">⚙️</div></div>
    </div>
    <div class="ph"><div style="display:flex;justify-content:space-between;align-items:baseline;"><div class="ptitle">Baixa de Preço</div><div style="font-size:13px;color:var(--tx2);" id="cnt">0 itens</div></div></div>
    <div class="sw"><div class="sbox"><input id="busca" placeholder="Buscar..." oninput="rEst()"><button class="scan-btn">📱</button></div></div>
    <div class="scroll"><div class="clist" id="le"></div></div>
  </div>

  <div class="screen" id="s-aguardando">
    <div class="topbar">
      <div class="pill" onclick="abrirLojas()"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);"></span><span id="ln-a">Loja 1</span></div>
      <div style="display:flex;gap:6px;"><div class="ibtn">🔗</div><div class="ibtn">⚙️</div></div>
    </div>
    <div class="ph"><div class="ptitle">Aguardando</div></div>
    <div class="scroll"><div class="clist" id="la"></div></div>
  </div>

  <div class="screen" id="s-dashboard">
    <div class="topbar">
      <div class="pill" onclick="abrirLojas()"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);"></span><span id="ln-d">Loja 1</span></div>
      <div style="display:flex;gap:6px;"><div class="ibtn">🔗</div><div class="ibtn">⚙️</div></div>
    </div>
    <div class="ph"><div class="ptitle">Resumo</div></div>
    <div class="scroll"><div class="clist" id="ld"></div></div>
  </div>

  <button class="fab" onclick="abrirForm(null)">+</button>
  <nav class="bnav">
    <button class="nitem active" id="n-estoque" onclick="irPara('estoque')"><div>📦</div><div>Baixa</div></button>
    <button class="nitem" id="n-aguardando" onclick="irPara('aguardando')"><div>⏰</div><div>Aguard.</div></button>
    <button class="nitem" id="n-dashboard" onclick="irPara('dashboard')"><div>📉</div><div>Resumo</div></button>
  </nav>
</div>

<!-- PAINEL DE LOJAS -->
<div class="ov" id="ov-lojas" onclick="fecharLojas()"></div>
<div class="panel" id="p-lojas">
  <div class="panel-header">
    <button class="panel-back" onclick="fecharLojas()">←</button>
    <div class="panel-title">Lojas</div>
  </div>
  <div class="panel-body">
    <div id="ll"></div>
    <button class="sbtn" onclick="abrirNovaLoja()" style="margin-top:20px;"><span>+</span> Adicionar Loja</button>
  </div>
</div>

<!-- MODAL MENU LOJA -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;" id="modal-menu-loja">
  <div style="background:#1a1a1a;border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:300px;">
    <h3 id="menu-loja-titulo" style="font-size:16px;font-weight:700;margin-bottom:20px;text-align:center;"></h3>
    
    <button id="btn-selecionar-loja" style="width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;">Selecionar Loja</button>
    
    <button id="btn-limpar-loja" style="width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:none;background:var(--sf2);color:var(--tx);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;">🧹 Limpar Produtos</button>
    
    <button id="btn-deletar-loja" style="width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:none;background:rgba(224,82,82,.2);color:var(--red);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;">🗑️ Deletar Loja</button>
    
    <button style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--sf2);color:var(--tx);font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="fecharMenuLoja()">Cancelar</button>
  </div>
</div>

<!-- MODAL NOVA LOJA -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;" id="modal-nova-loja">
  <div style="background:#1a1a1a;border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:320px;">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">Nova Loja</h3>
    
    <div style="margin-bottom:14px;">
      <label style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;display:block;margin-bottom:6px;">Número</label>
      <input type="text" id="nl-numero" placeholder="Ex: 1, 2, 3..." style="background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:100%;" oninput="validarNovaLoja()">
    </div>
    
    <div style="margin-bottom:20px;">
      <label style="font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;display:block;margin-bottom:6px;">Cidade</label>
      <input type="text" id="nl-cidade" placeholder="Ex: São Paulo..." style="background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:100%;" oninput="validarNovaLoja()">
    </div>
    
    <div style="display:flex;gap:10px;">
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--sf2);color:var(--tx);font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="fecharNovaLoja()">Cancelar</button>
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" id="btn-nova-loja" disabled onclick="confirmarNovaLoja()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR DELETAR LOJA -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;" id="modal-confirmar-deletar">
  <div style="background:#1a1a1a;border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:300px;">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;text-align:center;">Deletar Loja?</h3>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:20px;text-align:center;" id="msg-deletar-loja"></p>
    
    <div style="display:flex;gap:10px;">
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--sf2);color:var(--tx);font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="fecharConfirmarDeletar()">Cancelar</button>
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="executarDeletarLoja()">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR LIMPAR LOJA -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;" id="modal-confirmar-limpar">
  <div style="background:#1a1a1a;border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:300px;">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;text-align:center;">Limpar Produtos?</h3>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:20px;text-align:center;" id="msg-limpar-loja"></p>
    
    <div style="display:flex;gap:10px;">
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--sf2);color:var(--tx);font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="fecharConfirmarLimpar()">Cancelar</button>
      <button style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;" onclick="executarLimparLoja()">Confirmar</button>
    </div>
  </div>
</div>

<!-- MODAL CADASTRO PRODUTO -->
<div class="ov" id="ov-form" onclick="if(event.target===this)fecharForm()"></div>
<div class="ov" id="ov-form2" style="display:none;align-items:flex-end;" onclick="if(event.target===this)fecharForm()">
  <div class="drawer">
    <div class="dhandle"></div>
    <div class="dhead">
      <button class="dclose" onclick="fecharForm()">✕</button>
      <div class="dtitle" id="tf2">Cadastrar</div>
      <button class="sbtn" onclick="salvar()" id="btn-salvar" disabled style="width:auto;padding:6px 14px;">Salvar</button>
    </div>
    <div class="dbody">
      <div class="frow">
        <div class="fcol">
          <div class="req-row"><label class="flbl">Código</label><span class="req-star">*</span></div>
          <div style="display:flex;gap:6px;"><input class="finp" id="fc" placeholder="123456" oninput="validarForm()" style="flex:1;"><button class="scan-btn">📱</button></div>
        </div>
        <div class="fcol">
          <label class="flbl">Lote</label>
          <input class="finp" id="fl" placeholder="Sjj">
        </div>
      </div>
      <div class="ffull">
        <div class="req-row"><label class="flbl">Descrição</label><span class="req-star">*</span></div>
        <input class="finp" id="fd" placeholder="Produto" oninput="validarForm()">
      </div>
      <div class="ffull">
        <div class="req-row"><label class="flbl">Vencimento</label><span class="req-star">*</span></div>
        <input class="finp" id="fv" type="date" oninput="validarForm()">
      </div>
      <div class="ffull">
        <label class="flbl">Status</label>
        <div class="sopts">
          <button class="sopt" data-s="AG" onclick="selSt(this)">AGUARDANDO</button>
          <button class="sopt" data-s="BP" onclick="selSt(this)">BAIXA PREÇO</button>
          <button class="sopt" data-s="RL" onclick="selSt(this)">RELANÇAR</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tw" id="tw"></div>

<script>
var lojas=[],lojaAtiva='loja1';
var idEd=null,stSel='';

function carregarLocal(){
  try{lojas=JSON.parse(localStorage.getItem('sc5_lojas')||'[]');}catch(e){}
  if(!lojas.length){lojas=[{id:'loja1',nome:'Loja 1',dados:[]}];}
  try{lojaAtiva=localStorage.getItem('sc5_lojaAtiva')||'loja1';}catch(e){}
}

function salvarLocal(){
  try{localStorage.setItem('sc5_lojas',JSON.stringify(lojas));localStorage.setItem('sc5_lojaAtiva',lojaAtiva);}catch(e){}
}

function getLoja(){return lojas.find(function(l){return l.id===lojaAtiva;})||lojas[0];}
function getEst(){return getLoja().dados;}
function setEst(arr){getLoja().dados=arr;salvarLocal();}

function cartao(it){
  var div=document.createElement('div');
  div.className='card';
  div.innerHTML='<div class="cname">'+it.d+'</div><div style="font-size:12px;color:var(--tx2);">Código: '+it.c+'</div>';
  div.onclick=function(){abrirForm(it.id);};
  return div;
}

function rLista(cont,itens){cont.innerHTML='';if(!itens.length){cont.innerHTML='<div class="empty">📦 Vazio</div>';return;}itens.forEach(function(it){cont.appendChild(cartao(it));});}

function rEst(){
  var est=getEst(),q=(document.getElementById('busca').value||'').toLowerCase();
  var d=est.filter(function(i){return !q||i.c.includes(q)||i.d.toLowerCase().includes(q);});
  document.getElementById('cnt').textContent=d.length+' itens';
  rLista(document.getElementById('le'),d);
}

function rAg(){rLista(document.getElementById('la'),getEst().filter(function(i){return i.s==='AG';}));}

function rRes(){rLista(document.getElementById('ld'),getEst());}

function rNome(){var n=getLoja().nome;document.getElementById('ln-e').textContent=n;document.getElementById('ln-a').textContent=n;document.getElementById('ln-d').textContent=n;}

function renderLojas(){
  var cont=document.getElementById('ll');
  cont.innerHTML='';
  lojas.forEach(function(l){
    var at=l.id===lojaAtiva;
    var div=document.createElement('div');
    div.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;';
    if(at){div.style.cssText+='border-color:var(--red);background:rgba(224,82,82,.08);';}
    
    var dot=document.createElement('div');
    dot.style.cssText='width:10px;height:10px;border-radius:50%;background:var(--bd);flex-shrink:0;';
    if(at){dot.style.background='var(--red)';}
    div.appendChild(dot);
    
    var nome=document.createElement('div');
    nome.style.cssText='font-size:14px;font-weight:600;flex:1;';
    nome.textContent=l.nome;
    div.appendChild(nome);
    
    if(at){
      var check=document.createElement('span');
      check.textContent='✓';
      check.style.cssText='color:var(--red);font-size:16px;font-weight:800;';
      div.appendChild(check);
    }
    
    div.onclick=function(){abrirMenuLoja(l.id,l.nome);};
    cont.appendChild(div);
  });
}

function abrirMenuLoja(lojaId,lojaNome){
  document.getElementById('menu-loja-titulo').textContent=lojaNome;
  document.getElementById('btn-selecionar-loja').onclick=function(){lojaAtiva=lojaId;salvarLocal();renderTudo();fecharLojas();fecharMenuLoja();};
  document.getElementById('btn-limpar-loja').onclick=function(){abrirConfirmarLimpar(lojaId,lojaNome);};
  document.getElementById('btn-deletar-loja').onclick=function(){abrirConfirmarDeletar(lojaId,lojaNome);};
  document.getElementById('modal-menu-loja').style.display='flex';
}

function fecharMenuLoja(){
  document.getElementById('modal-menu-loja').style.display='none';
}

function abrirNovaLoja(){
  document.getElementById('nl-numero').value='';
  document.getElementById('nl-cidade').value='';
  document.getElementById('modal-nova-loja').style.display='flex';
  validarNovaLoja();
}

function fecharNovaLoja(){
  document.getElementById('modal-nova-loja').style.display='none';
}

function validarNovaLoja(){
  var n=(document.getElementById('nl-numero').value||'').trim();
  var c=(document.getElementById('nl-cidade').value||'').trim();
  document.getElementById('btn-nova-loja').disabled=!(n&&c);
}

function confirmarNovaLoja(){
  var n=(document.getElementById('nl-numero').value||'').trim();
  var c=(document.getElementById('nl-cidade').value||'').trim();
  if(!n||!c){avisar('⚠️ Preencha tudo');return;}
  var nc='Loja '+n+' - '+c;
  if(lojas.find(function(l){return l.nome===nc;})){avisar('⚠️ Já existe');return;}
  lojas.push({id:'loja_'+Date.now(),nome:nc,dados:[]});
  lojaAtiva=lojas[lojas.length-1].id;
  salvarLocal();
  renderLojas();
  renderTudo();
  fecharNovaLoja();
  avisar('✅ '+nc+' criada');
}

function abrirConfirmarDeletar(lojaId,lojaNome){
  if(lojas.length<=1){avisar('⚠️ Não pode deletar única loja');return;}
  window._lojaIdDeletar=lojaId;
  window._lojaNomeDeletar=lojaNome;
  document.getElementById('msg-deletar-loja').textContent='Tem certeza que deseja deletar "'+lojaNome+'"?';
  document.getElementById('modal-confirmar-deletar').style.display='flex';
  fecharMenuLoja();
}

function fecharConfirmarDeletar(){
  document.getElementById('modal-confirmar-deletar').style.display='none';
}

function executarDeletarLoja(){
  var lojaId=window._lojaIdDeletar;
  lojas=lojas.filter(function(l){return l.id!==lojaId;});
  if(lojaAtiva===lojaId)lojaAtiva=lojas[0].id;
  salvarLocal();
  renderLojas();
  renderTudo();
  avisar('✅ Loja deletada');
  fecharConfirmarDeletar();
}

function abrirConfirmarLimpar(lojaId,lojaNome){
  window._lojaIdLimpar=lojaId;
  window._lojaNomeLimpar=lojaNome;
  document.getElementById('msg-limpar-loja').textContent='Tem certeza que deseja limpar todos os produtos de "'+lojaNome+'"?';
  document.getElementById('modal-confirmar-limpar').style.display='flex';
  fecharMenuLoja();
}

function fecharConfirmarLimpar(){
  document.getElementById('modal-confirmar-limpar').style.display='none';
}

function executarLimparLoja(){
  var lojaId=window._lojaIdLimpar;
  var loja=lojas.find(function(l){return l.id===lojaId;});
  if(loja){loja.dados=[];salvarLocal();renderLojas();renderTudo();avisar('✅ Produtos removidos');fecharConfirmarLimpar();}
}

function irPara(t){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-'+t).classList.add('active');
  document.querySelectorAll('.nitem').forEach(function(n){n.classList.remove('active');});
  document.getElementById('n-'+t).classList.add('active');
  if(t==='estoque')rEst();else if(t==='aguardando')rAg();else rRes();
}

function abrirLojas(){
  renderLojas();
  document.getElementById('ov-lojas').classList.add('open');
  document.getElementById('p-lojas').classList.add('open');
}

function fecharLojas(){
  document.getElementById('ov-lojas').classList.remove('open');
  document.getElementById('p-lojas').classList.remove('open');
}

function abrirForm(id){
  var est=getEst();
  idEd=id;
  stSel='';
  if(id){
    var it=est.find(function(i){return i.id===id;});
    document.getElementById('tf2').textContent='Editar';
    document.getElementById('fc').value=it.c;
    document.getElementById('fl').value=it.l;
    document.getElementById('fd').value=it.d;
    document.getElementById('fv').value=it.v;
    stSel=it.s;
  }else{
    document.getElementById('tf2').textContent='Cadastrar';
    document.getElementById('fc').value='';
    document.getElementById('fl').value='';
    document.getElementById('fd').value='';
    document.getElementById('fv').value='';
  }
  document.querySelectorAll('.sopt').forEach(function(b){b.classList.toggle('sel',b.dataset.s===stSel);});
  validarForm();
  document.getElementById('ov-form2').style.display='flex';
}

function fecharForm(){
  document.getElementById('ov-form2').style.display='none';
}

function validarForm(){
  var c=(document.getElementById('fc').value||'').trim();
  var d=(document.getElementById('fd').value||'').trim();
  var v=(document.getElementById('fv').value||'').trim();
  document.getElementById('btn-salvar').disabled=!(c&&d&&v);
}

function selSt(btn){
  document.querySelectorAll('.sopt').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  stSel=btn.dataset.s;
}

function salvar(){
  var est=getEst();
  var c=document.getElementById('fc').value.trim();
  var d=document.getElementById('fd').value.trim();
  var v=document.getElementById('fv').value.trim();
  if(!c||!d||!v){avisar('⚠️ Preencha obrigatórios');return;}
  var dados={c:c,l:document.getElementById('fl').value.trim(),d:d,v:v,s:stSel};
  if(idEd){
    var i=est.findIndex(function(x){return x.id===idEd;});
    est[i]=Object.assign({},est[i],dados);
  }else{
    est.push(Object.assign({id:Date.now()},dados));
  }
  setEst(est);
  fecharForm();
  renderTudo();
  avisar('✅ Salvo');
}

function avisar(msg){
  var el=document.createElement('div');
  el.className='toast';
  el.textContent=msg;
  document.getElementById('tw').appendChild(el);
  setTimeout(function(){el.remove();},2500);
}

function renderTudo(){
  rNome();
  rEst();
  rAg();
  rRes();
}

carregarLocal();
renderTudo();
</script>

</body>
</html>
